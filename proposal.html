<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>박지현 팀장 · 공구 제안서 빌더 · 브레인숲</title>
<style>
  :root {
    color-scheme: light;
    --purple-deep: #4C1D95;
    --purple-main: #6D28D9;
    --purple-mid: #8B5CF6;
    --purple-soft: #C4B5FD;
    --purple-bg: #F3EFFF;
    --yellow-deep: #B7791F;
    --yellow-main: #ECC94B;
    --yellow-soft: #FAF089;
    --yellow-bg: #FEF9E7;
    --cream: #FCFBF7;
    --paper: #FFFFFF;
    --ink: #1A1033;
    --ink-soft: #5B4B7A;
    --line: #E8E2F0;
    --danger: #C53030;
    --success: #16A34A;
    --shadow: 0 4px 20px rgba(109, 40, 217, 0.08);
    --shadow-lg: 0 10px 40px rgba(109, 40, 217, 0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    background: linear-gradient(135deg, #FAF8FF 0%, #F5F0FA 100%);
    color: var(--ink); line-height: 1.55; min-height: 100vh; font-size: 14px;
  }
  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple-main) 60%, var(--purple-mid) 100%);
    color: white; padding: 20px 32px;
    box-shadow: var(--shadow-lg); position: relative; overflow: hidden;
  }
  .header::before { content: ''; position: absolute; top: -50%; right: -10%; width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(236,201,75,0.25) 0%, transparent 70%); pointer-events: none; }
  .header-inner { max-width: 1600px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between;
    position: relative; z-index: 1; flex-wrap: wrap; gap: 16px; }
  .brand { display: flex; align-items: center; gap: 14px; }
  .logo-mark { width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--yellow-main) 0%, var(--yellow-soft) 100%);
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(236,201,75,0.4); font-size: 24px; }
  .brand-title { font-size: 21px; font-weight: 800; letter-spacing: -0.5px; }
  .brand-sub { font-size: 12px; opacity: 0.9; font-weight: 400; margin-top: 2px; letter-spacing: 0.5px; }
  .back-link { color: white; text-decoration: none; font-size: 13px; opacity: 0.9;
    padding: 8px 14px; background: rgba(255,255,255,0.15); border-radius: 100px;
    backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
    transition: all 0.2s; }
  .back-link:hover { background: rgba(255,255,255,0.25); }

  /* ===== LAYOUT (세로형 단일 컬럼) ===== */
  .workspace {
    max-width: 1400px; margin: 0 auto; padding: 16px 20px 80px;
    display: flex; flex-direction: column; gap: 16px;
  }

  /* ===== TOP STICKY BUILDER BAR ===== */
  .builder { background: var(--paper); border-radius: 14px;
    box-shadow: var(--shadow); border: 1px solid var(--line);
    position: sticky; top: 12px; z-index: 50;
  }

  /* ===== CATALOG (full width) ===== */
  .catalog { background: var(--paper); border-radius: 14px;
    box-shadow: var(--shadow); border: 1px solid var(--line);
    display: flex; flex-direction: column;
  }
  .catalog-head { padding: 16px 20px; border-bottom: 1px solid var(--line);
    background: linear-gradient(135deg, var(--purple-bg) 0%, #FBF9FF 100%);
    border-radius: 16px 16px 0 0; }
  .catalog-title { font-size: 16px; font-weight: 800; color: var(--purple-deep); margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px; }
  .search-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .search-box { flex: 1; min-width: 180px; padding: 10px 14px; border: 1.5px solid var(--line);
    border-radius: 10px; font-family: inherit; font-size: 13.5px; background: white;
    transition: border-color 0.2s; }
  .search-box:focus { outline: none; border-color: var(--purple-mid); }
  .filter-chip { padding: 8px 12px; background: white; border: 1.5px solid var(--line);
    border-radius: 100px; cursor: pointer; font-size: 12px; font-weight: 600;
    color: var(--ink-soft); transition: all 0.15s; }
  .filter-chip:hover { border-color: var(--purple-soft); }
  .filter-chip.active { background: var(--purple-main); color: white; border-color: var(--purple-main); }

  .cat-tabs { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 16px;
    border-bottom: 1px solid var(--line); background: var(--cream); }
  .cat-tab { padding: 7px 12px; background: white; border: 1px solid var(--line);
    border-radius: 100px; cursor: pointer; font-size: 12px; font-weight: 600;
    color: var(--ink-soft); white-space: nowrap; transition: all 0.15s; }
  .cat-tab:hover { color: var(--purple-deep); }
  .cat-tab.active { background: var(--purple-deep); color: white; border-color: var(--purple-deep); }
  .cat-tab .cnt { opacity: 0.7; font-size: 10.5px; margin-left: 4px; }

  .catalog-body { padding: 16px 20px; }
  .series-block { margin-bottom: 24px; }
  .series-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid var(--yellow-main);
  }
  .series-name { font-size: 15px; font-weight: 800; color: var(--purple-deep);
    display: flex; align-items: center; gap: 6px; }
  .series-notice { font-size: 11px; color: var(--ink-soft); margin-bottom: 8px; font-style: italic; }
  .series-items { display: grid; gap: 8px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
  @media (max-width: 600px) { .series-items { grid-template-columns: 1fr; } }
  .item-card { display: grid; grid-template-columns: 48px 1fr 28px; gap: 8px;
    align-items: center; padding: 6px; border: 1px solid var(--line);
    border-radius: 8px; background: white; transition: all 0.15s; min-height: 60px; }
  .item-card:hover { border-color: var(--purple-soft); background: #FCFBFF; }
  .item-card.added { border-color: var(--success); background: #F0FDF4; }
  .item-img { width: 48px; height: 48px; border-radius: 6px; background: var(--purple-bg);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    font-size: 18px; color: var(--purple-mid); position: relative; }
  .item-img img { width: 100%; height: 100%; object-fit: cover; }
  .item-img .fallback-emoji { position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center; font-size: 22px; }
  .item-info { min-width: 0; }
  .item-type { display: inline-block; padding: 1px 5px; background: var(--purple-bg);
    color: var(--purple-deep); border-radius: 3px; font-size: 9.5px; font-weight: 700;
    margin-right: 3px; }
  .item-type.set { background: #DBEAFE; color: #1E3A8A; }
  .item-type.option { background: #FEF3C7; color: #92400E; }
  .item-type.recommended { background: #FECACA; color: #991B1B; }
  .item-name { font-size: 11.5px; font-weight: 600; color: var(--ink); line-height: 1.25;
    word-break: break-word; margin: 2px 0; overflow: hidden;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .item-price { font-size: 10.5px; color: var(--ink-soft); }
  .item-price .sale { color: var(--purple-deep); font-weight: 700; font-size: 12px; }
  .item-price .strike { text-decoration: line-through; color: #AAA; margin-right: 3px; font-size: 9.5px; }
  .item-margin { color: var(--success); font-weight: 600; }
  .item-add { width: 28px; height: 28px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--purple-main) 0%, var(--purple-mid) 100%);
    color: white; border-radius: 6px; font-size: 14px; font-weight: 700;
    transition: all 0.15s; padding: 0; }
  .item-add:hover { transform: scale(1.05); }
  .item-card.added .item-add { background: var(--success); }

  /* ===== TOP BUILDER (compact horizontal) ===== */
  .builder-head { padding: 12px 18px; border-bottom: 1px solid var(--line);
    background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple-main) 100%);
    color: white; border-radius: 14px 14px 0 0;
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .builder-title { font-size: 15px; font-weight: 800; }
  .builder-sub { font-size: 11.5px; opacity: 0.85; margin-top: 2px; }
  .builder-body { padding: 14px 18px;
    display: grid; grid-template-columns: 1.2fr 1.5fr 1fr; gap: 14px; align-items: start; }
  @media (max-width: 980px) { .builder-body { grid-template-columns: 1fr; } }

  .builder-col { display: flex; flex-direction: column; gap: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 10.5px; font-weight: 800;
    color: var(--purple-deep); text-transform: uppercase; letter-spacing: 0.4px; }
  .field input, .field select { width: 100%; padding: 8px 10px;
    border: 1.5px solid var(--line); border-radius: 7px; font-family: inherit;
    font-size: 13px; background: var(--cream); transition: border-color 0.2s; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--purple-mid); background: white; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .commission-box { background: var(--yellow-bg); border-radius: 8px; padding: 10px; }
  .commission-box .row { display: grid; grid-template-columns: 80px 70px 1fr; gap: 6px; align-items: center;
    font-size: 12px; margin-bottom: 5px; }
  .commission-box .row:last-child { margin-bottom: 0; }
  .commission-box .lbl { color: var(--ink-soft); font-weight: 600; }
  .commission-input { padding: 5px 8px; border: 1.5px solid var(--line);
    border-radius: 5px; font-family: inherit; font-size: 12.5px; background: white; }

  .cart-list { max-height: 180px; overflow-y: auto; margin-bottom: 8px; }
  .cart-empty { padding: 18px 0; text-align: center; color: var(--ink-soft); font-size: 12px;
    border: 2px dashed var(--line); border-radius: 8px; }
  .cart-item { display: grid; grid-template-columns: 40px 1fr auto; gap: 8px;
    padding: 8px; border-radius: 8px; background: var(--cream); margin-bottom: 6px;
    align-items: center; }
  .cart-img { width: 40px; height: 40px; border-radius: 6px; background: var(--purple-bg);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    font-size: 14px; }
  .cart-img img { width: 100%; height: 100%; object-fit: cover; }
  .cart-info { min-width: 0; font-size: 11.5px; }
  .cart-name { font-weight: 700; color: var(--ink); margin-bottom: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cart-price { color: var(--ink-soft); font-size: 10.5px; }
  .cart-price .b { color: var(--purple-deep); font-weight: 700; }
  .cart-del { width: 26px; height: 26px; border: none; cursor: pointer; background: #FEE2E2;
    color: var(--danger); border-radius: 6px; font-size: 12px; font-weight: 700; }

  .totals { padding: 12px; background: var(--purple-bg); border-radius: 10px; margin-bottom: 12px; font-size: 12.5px; }
  .totals .row { display: flex; justify-content: space-between; padding: 3px 0; }
  .totals .row.bold { font-weight: 800; color: var(--purple-deep); font-size: 14px;
    border-top: 1px solid var(--purple-soft); margin-top: 6px; padding-top: 8px; }

  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn { padding: 11px 14px; border: none; border-radius: 10px; cursor: pointer;
    font-family: inherit; font-size: 12.5px; font-weight: 700;
    transition: all 0.15s; }
  .btn.primary { background: linear-gradient(135deg, var(--purple-main) 0%, var(--purple-mid) 100%);
    color: white; box-shadow: 0 4px 12px rgba(109,40,217,0.25); }
  .btn.primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(109,40,217,0.35); }
  .btn.gold { background: linear-gradient(135deg, var(--yellow-main) 0%, #D4A93A 100%); color: #4A3A14; }
  .btn.ghost { background: white; color: var(--purple-main); border: 1.5px solid var(--purple-mid); }
  .btn.ghost:hover { background: var(--purple-bg); }

  .toggle-row { display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; background: var(--cream); border-radius: 8px; margin-bottom: 10px;
    font-size: 12.5px; font-weight: 600; }
  .toggle { position: relative; display: inline-block; width: 38px; height: 22px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #CBD5E0;
    border-radius: 22px; transition: 0.2s; }
  .toggle-slider::before { content: ''; position: absolute; height: 16px; width: 16px;
    left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s; }
  .toggle input:checked + .toggle-slider { background: var(--purple-main); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

  /* ===== PREVIEW MODAL ===== */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(26,16,51,0.55);
    z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); padding: 20px; }
  .modal-bg.show { display: flex; }
  .modal { background: white; border-radius: 16px; box-shadow: var(--shadow-lg);
    width: 800px; max-width: 100%; max-height: 92vh; overflow: auto;
    animation: modalIn 0.2s ease; }
  @keyframes modalIn { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* ===== PROPOSAL OUTPUT ===== */
  .proposal-output { padding: 32px; background: white; }
  .proposal-head { text-align: center; padding-bottom: 20px; border-bottom: 3px solid var(--purple-main);
    margin-bottom: 20px; }
  .proposal-head h1 { color: var(--purple-deep); font-size: 24px; margin-bottom: 6px; letter-spacing: -0.5px; }
  .proposal-head .sub { color: var(--ink-soft); font-size: 13px; }
  .proposal-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    padding: 14px 16px; background: var(--purple-bg); border-radius: 10px; margin-bottom: 16px; font-size: 13px; }
  .proposal-meta b { color: var(--purple-deep); display: block; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; }
  .proposal-notice { padding: 12px 14px; background: var(--yellow-bg); border-radius: 8px;
    margin-bottom: 16px; font-size: 12.5px; color: #6B5520; }
  .proposal-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 12px; }
  .proposal-table th { background: var(--purple-deep); color: white; padding: 8px 6px;
    font-weight: 700; text-align: center; font-size: 11px; }
  .proposal-table td { padding: 8px 6px; border-bottom: 1px solid var(--line); }
  .proposal-table .p-name { font-weight: 700; }
  .proposal-table .p-img { width: 44px; height: 44px; }
  .proposal-table .p-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
  .proposal-table .num { text-align: right; font-family: 'SF Mono', monospace; font-size: 11.5px; }
  .proposal-table tfoot td { background: var(--purple-bg); font-weight: 700;
    color: var(--purple-deep); border-top: 2px solid var(--purple-main); }
  .internal-only { background: #FEE2E2 !important; }
  .proposal-foot { padding-top: 16px; border-top: 1px solid var(--line); text-align: center;
    color: var(--ink-soft); font-size: 11.5px; }

  /* ===== PRINT / PDF ===== */
  @media print {
    @page { margin: 1.2cm; size: A4; }
    /* 색상 강제 보존 (Chrome/Edge/Safari) */
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }
    html, body { background: white !important; margin: 0; padding: 0; }
    /* 헤더, 작업 영역, 모달 배경 모두 숨김 */
    .header, .workspace, .nav-wrap { display: none !important; }
    /* 모달이 열려있어도 배경/오버레이 제거 */
    .modal-bg { display: block !important; position: static !important;
      padding: 0 !important; background: white !important; backdrop-filter: none !important; }
    .modal-bg:not(.show) { display: none !important; }
    .modal { box-shadow: none !important; max-height: none !important;
      width: 100% !important; max-width: 100% !important; border-radius: 0 !important;
      animation: none !important; overflow: visible !important; }
    /* 모달 하단 버튼 영역 (닫기/카톡복사/다운로드/인쇄) 숨김 */
    .modal > div:last-child,
    .modal .btn,
    #copyTextBtn, #downloadBtn { display: none !important; }
    .proposal-output { padding: 20px 0 !important; }
    /* 페이지 나눔 방지 */
    .proposal-output h3, .proposal-output .proposal-notice { page-break-after: avoid; }
    .proposal-table { page-break-inside: avoid; }
    .proposal-table tr { page-break-inside: avoid; }
    /* 색상이 확실히 인쇄되도록 표 헤더 강제 */
    .proposal-table th { background: #4C1D95 !important; color: white !important; }
    .proposal-meta { background: #F3EFFF !important; }
    .proposal-notice { background: #FEF9E7 !important; color: #6B5520 !important; }
    .proposal-head { border-bottom: 3px solid #6D28D9 !important; }
    .proposal-head h1 { color: #4C1D95 !important; }
    .internal-only { background: #FEE2E2 !important; }
    .proposal-table tfoot td { background: #F3EFFF !important; color: #4C1D95 !important; }
  }

  /* SCROLLBARS */
  .catalog-body::-webkit-scrollbar, .cart-list::-webkit-scrollbar { width: 8px; }
  .catalog-body::-webkit-scrollbar-thumb, .cart-list::-webkit-scrollbar-thumb {
    background: var(--purple-soft); border-radius: 8px; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    body { font-size: 13px; }
    .header { padding: 14px 16px; }
    .header-inner { gap: 10px; }
    .logo-mark { width: 40px; height: 40px; font-size: 20px; }
    .brand-title { font-size: 16px; }
    .brand-sub { font-size: 10px; }
    .back-link { font-size: 11px; padding: 6px 10px; }
    .workspace { padding: 10px; gap: 12px; }
    .catalog-head, .builder-head { padding: 12px 14px; }
    .catalog-title, .builder-title { font-size: 14px; }
    .builder-body { padding: 12px 14px; }
    .catalog-body { padding: 12px 14px; }
    .search-row { flex-direction: column; align-items: stretch; }
    .search-box { width: 100%; }
    .filter-chip { padding: 6px 10px; font-size: 11px; }
    .cat-tabs { padding: 8px 12px; }
    .cat-tab { padding: 6px 10px; font-size: 11px; }
    .series-name { font-size: 13.5px; }
    .field-row { grid-template-columns: 1fr; }
    .commission-box .row { grid-template-columns: 70px 1fr; }
    .commission-box .row > span:last-child { display: none; }
    .modal { border-radius: 12px; }
    .proposal-output { padding: 18px; }
    .proposal-head h1 { font-size: 18px; }
    .proposal-meta { grid-template-columns: 1fr; gap: 6px; padding: 10px; }
    .proposal-table { font-size: 10.5px; }
    .modal-bg { padding: 10px; }
    .modal > div:last-child { flex-wrap: wrap; }
    .modal > div:last-child .btn { flex: 1; min-width: 110px; font-size: 11.5px; padding: 9px 10px; }
  }
  @media (max-width: 480px) {
    .header { padding: 12px; }
    .header-inner { flex-direction: column; align-items: stretch; }
    .back-link { text-align: center; }
    .brand-title { font-size: 15px; }
    .item-price .sale { font-size: 12px; }
    .item-price .strike { font-size: 10px; }
    .totals { font-size: 11.5px; padding: 10px; }
    .totals .row.bold { font-size: 13px; }
    .proposal-table { font-size: 9.5px; display: block; overflow-x: auto; white-space: nowrap; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="logo-mark">📋</div>
      <div>
        <div class="brand-title">공구 제안서 빌더</div>
        <div class="brand-sub">박지현 팀장 · 브레인숲 Operation Center</div>
      </div>
    </div>
    <a href="index.html" class="back-link">← 대시보드로 돌아가기</a>
  </div>
</div>

<div class="workspace">
  <!-- ========== TOP: BUILDER ========== -->
  <div class="builder">
    <div class="builder-head">
      <div>
        <div class="builder-title">✏️ 제안서 빌더</div>
        <div class="builder-sub">셀러 정보 입력 → 아래에서 상품 선택 → 제안서 생성</div>
      </div>
      <div style="display:flex; gap:8px; align-items:center;">
        <span style="font-size:12px; opacity:0.9;">선택된 상품</span>
        <span id="cartCount" style="background:var(--yellow-main); color:#4A3A14; padding:4px 12px; border-radius:100px; font-size:13px; font-weight:800;">0</span>
      </div>
    </div>
    <div class="builder-body">

      <!-- Column 1: 셀러 정보 -->
      <div class="builder-col">
        <div class="field">
          <label>인플루언서 / 셀러명</label>
          <input type="text" id="sellerName" placeholder="예: 별주니맘, 사월이네">
        </div>
        <div class="field-row">
          <div class="field">
            <label>행사 시작일</label>
            <input type="date" id="eventStart">

// ============ STATE ============
let currentCat = 'all';
let currentFilter = 'all';
let cart = [];
let searchTerm = '';

// ============ UTILITY ============
function fmt(n) { return Math.round(n).toLocaleString('ko-KR'); }
function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function getRates() {
  return {
    seller: parseFloat(document.getElementById('sellerFeeRate').value) || 0,
    vendor: parseFloat(document.getElementById('vendorFeeRate').value) || 0,
    naver: parseFloat(document.getElementById('naverFeeRate').value) || 0
  };
}
function calcFees(sale) {
  const r = getRates();
  const naver = sale * r.naver / 100;
  const seller = sale * r.seller / 100;
  const vendor = sale * r.vendor / 100;
  return {naver, seller, vendor};
}
function calcMargin(item) {
  const f = calcFees(item.sale);
  return item.sale - item.cost - f.naver - f.seller - f.vendor;
}

// ============ RENDER CATEGORY TABS ============
function renderCatTabs() {
  const tabs = document.getElementById('catTabs');
  const allCount = CATALOG.reduce((s,c) => s + c.items.length, 0);
  let html = `<div class="cat-tab ${currentCat==='all'?'active':''}" data-cat="all">📦 전체 <span class="cnt">${allCount}</span></div>`;
  CATALOG.forEach(c => {
    html += `<div class="cat-tab ${currentCat===c.id?'active':''}" data-cat="${c.id}">${c.icon} ${escapeHtml(c.name)} <span class="cnt">${c.items.length}</span></div>`;
  });
  tabs.innerHTML = html;
  tabs.querySelectorAll('.cat-tab').forEach(t => {
    t.addEventListener('click', () => {
      currentCat = t.dataset.cat;
      renderCatTabs(); renderCatalog();
    });
  });
}

// ============ RENDER CATALOG ============
function renderCatalog() {
  const host = document.getElementById('catalogBody');
  const cats = currentCat === 'all' ? CATALOG : CATALOG.filter(c => c.id === currentCat);
  let html = '';
  cats.forEach(c => {
    const filtered = c.items.filter(item => {
      if (searchTerm && !item.name.toLowerCase().includes(searchTerm.toLowerCase()) &&
          !c.name.toLowerCase().includes(searchTerm.toLowerCase())) return false;
      if (currentFilter === '추천') return item.badge && item.badge.includes('★');
      if (currentFilter === '세트') return item.type === '세트' || item.type === '메인';
      if (currentFilter === '단품') return item.type === '단품' || item.type === '추가옵션';
      return true;
    });
    if (filtered.length === 0) return;
    html += `<div class="series-block">
      <div class="series-head">
        <div class="series-name">${c.icon} ${escapeHtml(c.name)}</div>
      </div>
      <div class="series-notice">📍 ${escapeHtml(c.notice)}</div>
      <div class="series-items">`;
    filtered.forEach((item, idx) => {
      const key = c.id + '__' + c.items.indexOf(item);
      const isAdded = cart.find(ci => ci.key === key);
      const imgSrc = item.img || c.img || '';
      const typeClass = item.type === '세트' || item.type === '메인' ? 'set' :
                        item.type === '추가옵션' ? 'option' : '';
      const badgeHtml = item.badge ? `<span class="item-type recommended">${escapeHtml(item.badge)}</span>` : '';
      html += `<div class="item-card ${isAdded?'added':''}" data-key="${key}">
        <div class="item-img">${imgSrc ? `<img src="${imgSrc}" alt="" onerror="this.style.display='none'">` : c.icon}</div>
        <div class="item-info">
          <span class="item-type ${typeClass}">${escapeHtml(item.type)}</span>${badgeHtml}
          <div class="item-name">${escapeHtml(item.name)}</div>
          <div class="item-price">
            <span class="strike">${fmt(item.consumer)}</span>
            <span class="sale">${fmt(item.sale)}원</span>
          </div>
        </div>
        <button class="item-add" data-key="${key}">${isAdded?'✓':'＋'}</button>
      </div>`;
    });
    html += `</div></div>`;
  });
  if (!html) html = '<div style="padding:40px 20px; text-align:center; color:var(--ink-soft);">검색 결과가 없습니다.</div>';
  host.innerHTML = html;
  host.querySelectorAll('.item-add').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      toggleCart(btn.dataset.key);
    });
  });
}

// ============ CART ============
function toggleCart(key) {
  const existing = cart.findIndex(c => c.key === key);
  if (existing >= 0) {
    cart.splice(existing, 1);
  } else {
    const [catId, idx] = key.split('__');
    const cat = CATALOG.find(c => c.id === catId);
    const item = cat.items[parseInt(idx)];
    cart.push({key, catId, catName: cat.name, catIcon: cat.icon, catNotice: cat.notice, catImg: cat.img, ...item});
  }
  renderCatalog(); renderCart();
}

function renderCart() {
  const list = document.getElementById('cartList');
  const totals = document.getElementById('totals');
  const cntEl = document.getElementById('cartCount');
  cntEl.textContent = cart.length;
  if (cart.length === 0) {
    list.innerHTML = '<div class="cart-empty">아래 카탈로그에서 상품을 추가해주세요</div>';
    totals.style.display = 'none';
    return;
  }
  list.innerHTML = cart.map(item => {
    const imgSrc = item.img || item.catImg || '';
    return `<div class="cart-item">
      <div class="cart-img">${imgSrc ? `<img src="${imgSrc}" alt="" onerror="this.style.display='none'">` : item.catIcon}</div>
      <div class="cart-info">
        <div class="cart-name">${escapeHtml(item.name)}</div>
        <div class="cart-price"><span class="b">${fmt(item.sale)}원</span> · 마진 ${fmt(calcMargin(item))}원</div>
      </div>
      <button class="cart-del" data-key="${item.key}">×</button>
    </div>`;
  }).join('');
  list.querySelectorAll('.cart-del').forEach(b => {
    b.addEventListener('click', e => { e.stopPropagation(); toggleCart(b.dataset.key); });
  });

  // totals
  let tSale = 0, tNaver = 0, tSeller = 0, tVendor = 0, tCost = 0;
  cart.forEach(item => {
    tSale += item.sale; tCost += item.cost;
    const f = calcFees(item.sale);
    tNaver += f.naver; tSeller += f.seller; tVendor += f.vendor;
  });
  const tMargin = tSale - tCost - tNaver - tSeller - tVendor;
  document.getElementById('totalSale').textContent = fmt(tSale) + '원';
  document.getElementById('totalNaver').textContent = fmt(tNaver) + '원';
  document.getElementById('totalSeller').textContent = fmt(tSeller) + '원';
  document.getElementById('totalVendor').textContent = fmt(tVendor) + '원';
  document.getElementById('totalMargin').textContent = fmt(tMargin) + '원';
  totals.style.display = 'block';
}

  let html = `<div class="proposal-head">

  <div class="proposal-meta">
    <div><b>셀러명</b>${escapeHtml(sellerName)}</div>
    <div><b>행사 기간</b>${evStart && evEnd ? evStart + ' ~ ' + evEnd : '협의'}</div>
    <div><b>셀러/업체 수수료</b>${rates.seller}% / ${rates.vendor}%</div>
  </div>`;

  Object.values(groups).forEach(g => {
    html += `<h3 style="color:var(--purple-deep); margin: 20px 0 8px; font-size:16px;">${g.catIcon} ${escapeHtml(g.catName)} 행사 제안서</h3>
    <div class="proposal-notice">📍 ${escapeHtml(g.catNotice)}</div>
    <table class="proposal-table">
      <thead><tr>
        <th>구분</th><th>이미지</th><th style="text-align:left">제품명</th>
        <th>소비자가</th><th>행사가</th>
        ${internal ? '<th class="internal-only">원가</th><th class="internal-only">마진</th>' : ''}
        <th>셀러수수료</th><th>업체수수료</th>
      </tr></thead>
      <tbody>`;
    g.items.forEach(item => {
      const f = calcFees(item.sale);
      const m = calcMargin(item);
      const imgSrc = item.img || g.catImg || '';
      html += `<tr>
        <td style="text-align:center">${escapeHtml(item.type)}${item.badge?'<br><small style="color:#C53030">'+escapeHtml(item.badge)+'</small>':''}</td>
        <td class="p-img">${imgSrc ? `<img src="${imgSrc}" alt="">` : ''}</td>
        <td class="p-name">${escapeHtml(item.name)}${item.desc?'<br><small style="color:#666">'+escapeHtml(item.desc)+'</small>':''}</td>
        <td class="num"><s>${fmt(item.consumer)}</s></td>
        <td class="num"><b>${fmt(item.sale)}</b></td>
        ${internal ? `<td class="num internal-only">${fmt(item.cost)}</td><td class="num internal-only" style="color:${m>=0?'#16A34A':'#C53030'}">${fmt(m)}</td>` : ''}
        <td class="num">${fmt(f.seller)}</td>
        <td class="num">${fmt(f.vendor)}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  });

  if (internal) {
    let tSale=0, tCost=0, tMargin=0;
    cart.forEach(item => { tSale+=item.sale; tCost+=item.cost; tMargin+=calcMargin(item); });
    html += `<div style="padding:14px; background:var(--purple-bg); border-radius:10px; margin-top:16px;">
      <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; text-align:center;">
        <div><div style="font-size:11px; color:var(--ink-soft); text-transform:uppercase;">총 행사가</div><div style="font-size:18px; font-weight:800; color:var(--purple-deep);">${fmt(tSale)}원</div></div>
        <div><div style="font-size:11px; color:var(--ink-soft); text-transform:uppercase;">총 원가</div><div style="font-size:18px; font-weight:800; color:var(--ink);">${fmt(tCost)}원</div></div>
        <div><div style="font-size:11px; color:var(--ink-soft); text-transform:uppercase;">예상 마진</div><div style="font-size:18px; font-weight:800; color:var(--success);">${fmt(tMargin)}원</div></div>
      </div>
    </div>`;
  }

  html += `<div class="proposal-foot">
    💜 (주)브레인숲 · CEO 이채림 · 경기도 성남시 중원구 둔촌대로 555 선일테크노피아 611호 · 031-777-3399 · brainsoop@naver.com
  </div>`;

  document.getElementById('proposalOutput').innerHTML = html;
}

// ============ EVENTS ============
document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value;
  renderCatalog();
});
document.querySelectorAll('.filter-chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    currentFilter = c.dataset.filter;
    renderCatalog();
  });
});
document.getElementById('clearBtn').addEventListener('click', () => {
  if (cart.length && !confirm('선택한 상품을 모두 비우시겠습니까?')) return;
  cart = []; renderCatalog(); renderCart();
});
document.getElementById('previewBtn').addEventListener('click', () => {
  if (cart.length === 0) { alert('먼저 상품을 선택해주세요.'); return; }
  renderPreview();
  document.getElementById('modalBg').classList.add('show');
});
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target.id === 'modalBg') e.currentTarget.classList.remove('show');
});
['sellerFeeRate','vendorFeeRate','naverFeeRate'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderCart);
});
document.getElementById('internalToggle').addEventListener('change', () => {
  if (document.getElementById('modalBg').classList.contains('show')) renderPreview();
});

document.getElementById('copyTextBtn').addEventListener('click', () => {
  const sellerName = document.getElementById('sellerName').value || '(셀러명)';
  let txt = `🌳 브레인숲 공구 제안서\n셀러: ${sellerName}\n\n`;
  const groups = {};
  cart.forEach(item => {
    if (!groups[item.catId]) groups[item.catId] = {catName: item.catName, items: []};
    groups[item.catId].items.push(item);
  });
  Object.values(groups).forEach(g => {
    txt += `▼ ${g.catName}\n`;
    g.items.forEach(item => {
      txt += `· ${item.name} | 소비자가 ${fmt(item.consumer)}원 → 행사가 ${fmt(item.sale)}원\n`;
    });
    txt += '\n';
  });
  txt += '문의: (주)브레인숲 박지현 팀장';
  navigator.clipboard.writeText(txt).then(() => alert('✅ 카톡용 텍스트가 복사되었습니다.'));
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  const html = document.getElementById('proposalOutput').innerHTML;
  const sellerName = document.getElementById('sellerName').value || 'proposal';
  const full = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>공구제안서 - ${sellerName}</title>
    <style>body{font-family:'Pretendard',sans-serif;padding:32px;max-width:900px;margin:0 auto;}
    table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px;}
    th{background:#4C1D95;color:white;padding:8px;text-align:center;}
    td{padding:8px;border-bottom:1px solid #ddd;} .num{text-align:right;font-family:monospace;}
    .p-img img{width:44px;height:44px;object-fit:cover;border-radius:4px;}
    .proposal-head{text-align:center;border-bottom:3px solid #6D28D9;padding-bottom:20px;margin-bottom:20px;}
    .proposal-head h1{color:#4C1D95;}
    .proposal-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:14px;background:#F3EFFF;border-radius:10px;margin-bottom:16px;font-size:13px;}
    .proposal-meta b{display:block;font-size:11px;color:#4C1D95;margin-bottom:3px;}
    .proposal-notice{padding:12px;background:#FEF9E7;border-radius:8px;margin-bottom:16px;font-size:12.5px;color:#6B5520;}
    .internal-only{background:#FEE2E2 !important;} .proposal-foot{text-align:center;color:#666;font-size:11px;margin-top:20px;}
    </style></head><body>${html}</body></html>`;
  const blob = new Blob([full], {type: 'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `공구제안서_${sellerName}_${new Date().toISOString().split('T')[0]}.html`;
  a.click();
  URL.revokeObjectURL(url);
});

// ============ INIT ============
renderCatTabs();
renderCatalog();
renderCart();
</script>

</body>
</html>
